services:
  - type: web
    name: alosa-server
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npx ts-node --project tsconfig.server.json server/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
